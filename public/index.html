<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMBO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --noir:#FDFCF9;--noir2:#F2F0E9;--marfil:#13243D;--humo:#77839B;
  --oro:#24466F;--oro-suave:rgba(36,70,111,.35);--linea:rgba(19,36,61,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--noir);color:var(--marfil);font-family:'Jost',sans-serif;font-weight:300;line-height:1.7}
.serif{font-family:'Cormorant Garamond',serif}
.lbl{font-size:.66rem;letter-spacing:.42em;text-transform:uppercase;color:var(--oro);font-weight:400}

/* ===== PORTADA CINEMATOGRÁFICA ===== */
.portada{
  position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;text-align:center;padding:8vh 6vw;
}
.fondos{position:absolute;inset:0;z-index:0}
.fondos .capa{
  position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transition:opacity 2.6s ease-in-out;
  transform:scale(1.06);animation:deriva 26s ease-in-out infinite alternate;
}
.fondos .capa.on{opacity:1}
@keyframes deriva{from{transform:scale(1.06) translate3d(0,0,0)}to{transform:scale(1.14) translate3d(-1.5%,-1%,0)}}
.velo{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(to bottom, rgba(253,252,249,.30) 0%, rgba(253,252,249,.55) 45%, rgba(253,252,249,.92) 100%),
    radial-gradient(ellipse 70% 55% at 50% 45%, rgba(253,252,249,.35), transparent 75%);
}
.portada-inner{position:relative;z-index:2;width:100%;max-width:820px}
.wordmark{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:clamp(3.4rem,11vw,8rem);letter-spacing:.28em;
  text-transform:uppercase;line-height:1;color:var(--marfil);
  text-indent:.28em; /* compensa el letter-spacing final para centrar óptico */
  animation:surge 1.6s ease both;
}
.lema{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1rem,2.1vw,1.4rem);color:var(--marfil);opacity:.82;
  margin:22px 0 46px;animation:surge 1.6s .3s ease both;
}
@keyframes surge{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.searchrow{
  display:flex;border:1px solid rgba(19,36,61,.28);
  background:rgba(253,252,249,.82);backdrop-filter:blur(8px);
  transition:border-color .4s, box-shadow .4s;
  animation:surge 1.6s .55s ease both;
}
.searchrow:focus-within{border-color:var(--oro);box-shadow:0 10px 40px rgba(19,36,61,.10)}
.searchrow input{flex:1;padding:20px 24px;background:transparent;border:0;outline:none;color:var(--marfil);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.08rem;min-width:0}
.searchrow input::placeholder{color:rgba(19,36,61,.42)}
.searchrow button{padding:0 34px;background:var(--oro);border:0;cursor:pointer;font-family:'Jost';font-weight:500;font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:#FDFCF9;transition:background .4s}
.searchrow button:hover{background:var(--marfil)}
.searchrow button:disabled{opacity:.5;cursor:wait}
@media(max-width:560px){
  .searchrow{flex-direction:column}
  .searchrow button{padding:16px}
}
.scroll-hint{
  position:absolute;bottom:38px;left:50%;transform:translateX(-50%);z-index:2;
  width:1px;height:52px;background:linear-gradient(to bottom, transparent, rgba(19,36,61,.45));
  animation:respira 2.8s ease-in-out infinite;
}
@keyframes respira{0%,100%{opacity:.25;height:44px}50%{opacity:.7;height:60px}}

#estado{display:none;text-align:center;padding:6vh 6vw;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;color:var(--humo)}
#estado .punto{display:inline-block;animation:pulso 1.6s infinite}
@keyframes pulso{0%,100%{opacity:.25}50%{opacity:1}}
#errorbox{display:none;text-align:center;padding:4vh 6vw;font-family:'Cormorant Garamond',serif;font-style:italic;color:#C98E7A}

#dossier{display:none;max-width:1080px;margin:0 auto;padding:0 6vw 14vh}
.d-head{padding:5vh 0 0}
.d-head .lbl{display:block;margin-bottom:14px}
.d-head h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(2.2rem,5.4vw,4rem);line-height:1.08}
.d-head .sub{color:var(--humo);max-width:60ch;margin-top:16px;font-size:.98rem}
.d-hero{margin-top:44px;height:clamp(240px,40vw,460px);position:relative;overflow:hidden;border:1px solid var(--linea)}
.foto{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#E9EDF3;transition:opacity 1.2s;opacity:0}
.foto.in{opacity:1}
.d-hero .cap{position:absolute;bottom:0;left:0;right:0;padding:16px 22px;background:linear-gradient(to top, rgba(253,252,249,.92), transparent);font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--marfil)}

.d-sec{margin-top:9vh}
.d-sec .lbl{display:block;margin-bottom:8px}
.d-sec h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(1.5rem,3vw,2.1rem);margin-bottom:38px}

.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--linea);border:1px solid var(--linea)}
@media(max-width:820px){.hgrid{grid-template-columns:1fr}}
.hotel{background:var(--noir);transition:background .5s}
.hotel:hover{background:var(--noir2)}
.hotel .ph{height:190px;position:relative;overflow:hidden}
.hotel .cuerpo{padding:26px 26px 30px}
.hotel .marcah{font-size:.6rem;letter-spacing:.32em;text-transform:uppercase;color:var(--oro);display:block;margin-bottom:10px}
.hotel h4{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.25rem;margin-bottom:8px}
.hotel p{font-size:.85rem;color:var(--humo)}

.mesas{border-top:1px solid var(--linea)}
.mesa{display:grid;grid-template-columns:110px 1fr auto;gap:26px;align-items:start;padding:22px 4px;border-bottom:1px solid var(--linea)}
.mfoto{width:110px;height:78px;position:relative;overflow:hidden;border:1px solid var(--linea);background:#EAEEF4}
.mesa .num{font-family:'Cormorant Garamond',serif;color:var(--oro);letter-spacing:.2em}
.mesa h4{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.2rem}
.mesa .nota{font-size:.85rem;color:var(--humo);grid-column:2;max-width:64ch}
.mesa .tipo{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--humo);white-space:nowrap}
@media(max-width:640px){.mesa{grid-template-columns:auto 1fr}.mesa .tipo{display:none}}

.dos-col{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--linea);border:1px solid var(--linea)}
@media(max-width:820px){.dos-col{grid-template-columns:1fr}}
.bloque{background:var(--noir);padding:40px 38px}
.bloque .lbl{margin-bottom:14px;display:block}
.bloque h4{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.4rem;margin-bottom:12px}
.bloque p{font-size:.9rem;color:var(--humo)}
.bloque ul{list-style:none;margin-top:16px}
.bloque li{padding:11px 0;border-top:1px solid var(--linea);font-size:.92rem;display:flex;gap:16px;align-items:baseline}
.bloque li i{min-width:6px;height:6px;transform:rotate(45deg);border:1px solid var(--oro);display:block;position:relative;top:1px}

.d-cta{margin-top:10vh;text-align:center;padding:8vh 6vw;border:1px solid var(--linea);position:relative}
.d-cta::before{content:"";position:absolute;inset:10px;border:1px solid rgba(198,161,91,.16);pointer-events:none}
.d-cta h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(1.5rem,3vw,2.1rem);margin-bottom:12px}
.d-cta p{color:var(--humo);font-size:.92rem;margin-bottom:34px}
.d-cta a{font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;text-decoration:none;background:var(--oro);color:var(--noir);padding:16px 40px;font-weight:500;transition:background .4s}
.d-cta a:hover{background:var(--marfil)}

.credito{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(154,144,129,.6);text-align:right;margin-top:8px}
.disclaimer{font-size:.75rem;font-style:italic;color:var(--humo);margin-top:20px;padding:14px 18px;border-left:1px solid var(--oro-suave);background:rgba(36,70,111,.03)}

.itin{border-left:1px solid var(--linea);margin-left:6px;padding-left:0}
.dia{position:relative;padding:0 0 34px 34px}
.dia::before{content:'';position:absolute;left:-4px;top:6px;width:7px;height:7px;transform:rotate(45deg);background:var(--noir);border:1px solid var(--oro)}
.dia .fecha{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--oro);display:block;margin-bottom:4px}
.dia h4{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.3rem;margin-bottom:12px}
.dia .mom{display:grid;grid-template-columns:70px 1fr;gap:14px;padding:5px 0;font-size:.9rem;color:var(--humo)}
.dia .mom b{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--marfil);font-weight:400;padding-top:2px}
.presu{border:1px solid var(--linea)}
.prow{display:grid;grid-template-columns:1fr auto;gap:20px;padding:16px 22px;border-bottom:1px solid var(--linea);font-size:.92rem}
.prow .concepto{color:var(--marfil)}
.prow .monto{font-family:'Cormorant Garamond',serif;color:var(--oro);white-space:nowrap}
.prow.total{background:var(--noir2)}
.prow.total .concepto{font-family:'Cormorant Garamond',serif;font-size:1.15rem}
.prow.total .monto{font-family:'Cormorant Garamond',serif;font-size:1.25rem}
.presu-nota{padding:14px 22px;font-size:.72rem;font-style:italic;color:var(--humo)}

footer{border-top:1px solid var(--linea);padding:34px 6vw;display:flex;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.85rem;letter-spacing:.34em;text-transform:uppercase;color:var(--humo)}
</style>
</head>
<body>

<section class="portada" id="ask">
  <div class="fondos" id="fondos" aria-hidden="true"></div>
  <div class="velo" aria-hidden="true"></div>
  <div class="portada-inner">
    <h1 class="wordmark">RUMBO</h1>
    <p class="lema">Díganos a dónde. Nosotros sabemos cómo.</p>
    <div class="searchrow">
      <input id="q" placeholder="Quiero ir a la Costa Amalfitana cinco noches en junio…" aria-label="Su viaje">
      <button id="go">Consultar</button>
    </div>
  </div>
  <div class="scroll-hint" aria-hidden="true"></div>
</section>

<div id="estado"></div>
<div id="errorbox"></div>
<section id="dossier"></section>

<footer>
  <span>Rumbo</span>
</footer>

<script>
const q=document.getElementById('q');
const go=document.getElementById('go');
const estado=document.getElementById('estado');
const errorbox=document.getElementById('errorbox');
const dossier=document.getElementById('dossier');

/* ===== PAISAJES DE FONDO ===== */
const ESCENAS=[
  'amalfi coast positano italy',
  'swiss alps mountains luxury',
  'kyoto japan autumn temple',
  'santorini greece sunset sea',
  'maldives overwater villa turquoise'
];
(async function paisajes(){
  const cont=document.getElementById('fondos');
  if(!cont)return;
  const urls=[];
  for(const e of ESCENAS){
    try{
      const r=await fetch(`/api/photos?tipo=escena&q=${encodeURIComponent(e)}`);
      const d=await r.json();
      if(d.url)urls.push(d.url);
    }catch(err){}
  }
  if(!urls.length)return;
  const capas=urls.map((u,i)=>{
    const el=document.createElement('div');
    el.className='capa';
    el.style.backgroundImage=`url('${u}')`;
    el.style.animationDelay=`${i*3}s`;
    cont.appendChild(el);
    return el;
  });
  let i=0;
  capas[0].classList.add('on');
  if(capas.length<2)return;
  if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  setInterval(()=>{
    capas[i].classList.remove('on');
    i=(i+1)%capas.length;
    capas[i].classList.add('on');
  },7000);
})();

const FRASES=[
  "La casa consulta sus notas de viaje<span class='punto'>…</span>",
  "Eligiendo las casas correctas<span class='punto'>…</span>",
  "Reservando opinión sobre las mesas<span class='punto'>…</span>",
  "Componiendo su propuesta<span class='punto'>…</span>",
];

async function consultar(){
  const consulta=q.value.trim();
  if(!consulta)return;
  go.disabled=true;errorbox.style.display='none';dossier.style.display='none';
  estado.style.display='block';
  let f=0;estado.innerHTML=FRASES[0];
  const rot=setInterval(()=>{estado.innerHTML=FRASES[++f%FRASES.length]},2400);

  try{
    const r=await fetch('/api/dossier',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({consulta})
    });
    const d=await r.json();
    clearInterval(rot);estado.style.display='none';go.disabled=false;
    if(d.error){errorbox.textContent=d.error;errorbox.style.display='block';return}
    render(d);
  }catch(e){
    clearInterval(rot);estado.style.display='none';go.disabled=false;
    errorbox.textContent='La casa no pudo responder. Intente de nuevo en un momento.';
    errorbox.style.display='block';
  }
}
go.onclick=consultar;
q.addEventListener('keydown',e=>{if(e.key==='Enter')consultar()});

async function fotoLugar(el,lugar,alterno){
  try{
    const r=await fetch(`/api/photos?tipo=lugar&q=${encodeURIComponent(lugar)}&alt=${encodeURIComponent(alterno||'')}`);
    const d=await r.json();
    if(d.url){
      el.style.backgroundImage=`url('${d.url}')`;
      requestAnimationFrame(()=>el.classList.add('in'));
    }
  }catch(e){}
}

async function foto(el,query){
  try{
    const r=await fetch(`/api/photos?tipo=escena&q=${encodeURIComponent(query)}`);
    const d=await r.json();
    if(d.url){
      el.style.backgroundImage=`url('${d.url}')`;
      requestAnimationFrame(()=>el.classList.add('in'));
      return d.credito;
    }
  }catch(e){}
  return null;
}

function render(d){
  dossier.innerHTML=`
  <div class="d-head">
    <span class="lbl">${d.destino.eyebrow}${d.viaje?.resumen?` · ${d.viaje.resumen}`:''}</span>
    <h2>${d.destino.nombre}</h2>
    <p class="sub">${d.destino.sub}</p>
    <div class="d-hero"><div class="foto" id="foto-hero"></div>
      <div class="cap">${d.destino.nombre}</div></div>
    <p class="credito" id="cred-hero"></p>
    <p class="disclaimer">Selección curada a modo de inspiración. Cada hotel, mesa y tarifa se verifica y confirma con usted antes de reservar.</p>
  </div>

  <div class="d-sec">
    <span class="lbl">Dónde quedarse</span>
    <h3 class="serif">Las casas correctas.</h3>
    <div class="hgrid">
      ${d.hoteles.map((h,i)=>`
      <div class="hotel">
        <div class="ph"><div class="foto" id="foto-h${i}"></div></div>
        <div class="cuerpo">
          <span class="marcah">${h.marca}</span>
          <h4>${h.nombre}</h4>
          <p>${h.nota}</p>
        </div>
      </div>`).join('')}
    </div>
  </div>

  <div class="d-sec">
    <span class="lbl">Dónde sentarse a la mesa</span>
    <h3 class="serif">Las mesas que merecen el viaje.</h3>
    <div class="mesas">
      ${d.mesas.map((m,i)=>`
      <div class="mesa">
        <div class="mfoto"><div class="foto" id="foto-m${i}"></div></div>
        <h4>${m.nombre}</h4>
        <span class="tipo">${m.tipo}</span>
        <p class="nota">${m.nota}</p>
      </div>`).join('')}
    </div>
  </div>

  <div class="d-sec">
    <div class="dos-col">
      <div class="bloque">
        <span class="lbl">La zona</span>
        <h4>${d.zona.nombre}</h4>
        <p>${d.zona.nota}</p>
      </div>
      <div class="bloque">
        <span class="lbl">Imperdibles</span>
        <h4>Lo que la casa recomienda</h4>
        <ul>${d.imperdibles.map(e=>`<li><i></i>${typeof e==='string'?e:(e.titulo||e.nombre||e.texto||e.descripcion||Object.values(e).join(' · '))}</li>`).join('')}</ul>
      </div>
    </div>
  </div>

  ${d.itinerario && d.itinerario.length ? `
  <div class="d-sec">
    <span class="lbl">Su viaje, día por día</span>
    <h3 class="serif">El itinerario.</h3>
    <div class="itin">
      ${d.itinerario.map(x=>`
      <div class="dia">
        <span class="fecha">Día ${x.dia}${x.fecha?` · ${x.fecha}`:''}</span>
        <h4>${x.titulo}</h4>
        ${x.manana?`<div class="mom"><b>Mañana</b><span>${x.manana}</span></div>`:''}
        ${x.tarde?`<div class="mom"><b>Tarde</b><span>${x.tarde}</span></div>`:''}
        ${x.noche?`<div class="mom"><b>Noche</b><span>${x.noche}</span></div>`:''}
      </div>`).join('')}
    </div>
  </div>` : ''}

  ${d.presupuesto ? `
  <div class="d-sec">
    <span class="lbl">La inversión</span>
    <h3 class="serif">Presupuesto estimado.</h3>
    <div class="presu">
      ${d.presupuesto.rubros.map(r=>`
      <div class="prow"><span class="concepto">${r.concepto}</span><span class="monto">${r.estimado} ${d.presupuesto.moneda}</span></div>`).join('')}
      <div class="prow total"><span class="concepto">Total estimado</span><span class="monto">${d.presupuesto.totalEstimado}</span></div>
      <div class="presu-nota">${d.presupuesto.nota}</div>
    </div>
  </div>` : ''}

  <div class="d-sec d-cta">
    <h3 class="serif">¿Le inspiró este dossier?</h3>
    <p>Es el punto de partida. Un especialista de la casa verifica cada detalle, confirma disponibilidad y precios, y convierte estas ideas en un itinerario reservado de punta a punta.</p>
    <a href="#ask">Solicitar a la casa</a>
  </div>`;

  dossier.style.display='block';
  document.querySelector('.d-head').scrollIntoView({behavior:'smooth'});

  // fotos: héroe + hoteles
  foto(document.getElementById('foto-hero'), d.destino.fotoQuery).then(c=>{
    if(c)document.getElementById('cred-hero').textContent=`Fotografía · ${c} vía Pexels`;
  });
  d.hoteles.forEach((h,i)=>fotoLugar(document.getElementById('foto-h'+i), `${h.nombre} ${d.destino.nombre}`, h.fotoQuery));
  d.mesas.forEach((m,i)=>{
    const el=document.getElementById('foto-m'+i);
    if(el)fotoLugar(el, `${m.nombre} restaurante ${d.destino.nombre}`, `fine dining restaurant`);
  });
}
</script>
</body>
</html>
